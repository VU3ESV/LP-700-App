# XcodeGen spec for the LP-700 out-of-process plugin (ExtensionKit `.appex`).
#
# SwiftPM can't build `.appex` bundles, so this small Xcode project produces the
# extension. It links only RadioPluginKit + this repo's own LP700App library; the
# standalone app and the in-process plugin (plain `swift build`) are unaffected.
#
# The generated .xcodeproj is gitignored — regenerate with:  (cd Xcode && xcodegen generate)
# `scripts/make-radioplugin.sh` does this and packages the `.radioplugin`.

name: LP700Plugin
options:
  bundleIdPrefix: org.vu3esv.radiosuite
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  RadioPluginKit:
    url: https://github.com/VU3ESV/RadioPluginKit.git
    from: "1.2.0"
  LP700App:
    path: ..              # this repo's SwiftPM package (LP700App library)

targets:
  LP700Extension:
    type: extensionkit-extension
    platform: macOS
    sources:
      - path: Extension
        excludes:
          - plugin.json    # packaged alongside the .appex, not compiled
    info:
      path: Extension/Info.plist
      properties:
        CFBundleName: LP-700
        CFBundleDisplayName: LP-700
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: org.vu3esv.radiosuite.plugin
    settings:
      base:
        # IMPORTANT: this bundle id is the plugin's identity — it must match
        # `plugin.json`'s `id` so the suite correlates the manifest to the extension.
        PRODUCT_BUNDLE_IDENTIFIER: org.vu3esv.radiosuite.LP700
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"      # ad-hoc for local dev; Developer-ID needed to ship
        ENABLE_HARDENED_RUNTIME: YES                          # required for notarization
        CODE_SIGN_ENTITLEMENTS: Extension/LP700.entitlements  # app-sandbox + network.client -> macOS registers it
    dependencies:
      - package: RadioPluginKit
        product: RadioPluginKit
      - package: RadioPluginKit
        product: RadioPluginUI
      - package: LP700App
        product: LP700App
